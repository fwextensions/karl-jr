name: Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/extension/package.json').version")" >> $GITHUB_OUTPUT

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="${{ steps.version.outputs.version }}"
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $PKG_VERSION"
            echo "::error::Update packages/extension/package.json to $TAG_VERSION before tagging"
            exit 1
          fi

      - name: Validate required secrets
        run: |
          missing=()
          [[ -z "$VITE_POSTHOG_API_KEY" ]] && missing+=("VITE_POSTHOG_API_KEY")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "::error::Add them to the repository secrets at Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "All required secrets are present"
        env:
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}

      - name: Build extension
        run: npm run build:extension
        # no BUILD_VERSION_NAME set, so no version_name is injected — clean release manifest
        env:
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          make_latest: true
          files: packages/extension/release/karl-jr-${{ steps.version.outputs.version }}.zip
          body: |
            Release build for Chrome Web Store submission.

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### Install unpacked
            1. Download and unzip `karl-jr-${{ steps.version.outputs.version }}.zip`
            2. Go to `chrome://extensions/`, enable **Developer mode**
            3. Click **Load unpacked** and select the unzipped folder

      - name: Upload to Chrome Web Store
        uses: mobilefirstllc/cws-publish@latest
        with:
          action: "publish"
          extension_id: ${{ secrets.CWS_EXTENSION_ID }}
          zip_file: packages/extension/release/karl-jr-${{ steps.version.outputs.version }}.zip
          client_id: ${{ secrets.CWS_CLIENT_ID }}
          client_secret: ${{ secrets.CWS_CLIENT_SECRET }}
          refresh_token: ${{ secrets.CWS_REFRESH_TOKEN }}
