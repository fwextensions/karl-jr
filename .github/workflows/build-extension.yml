name: Build Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build:extension

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./packages/extension/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload versioned artifact
        uses: actions/upload-artifact@v4
        with:
          name: karl-jr-${{ steps.version.outputs.version }}-${{ github.event_name == 'pull_request' && format('pr-{0}-', github.event.pull_request.number) || '' }}build-${{ github.run_number }}
          path: packages/extension/release/*.zip
          retention-days: 30

      - name: Rename zip for stable release asset name
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cp packages/extension/release/karl-jr-${{ steps.version.outputs.version }}.zip packages/extension/release/karl-jr-latest.zip

      - name: Update nightly release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Latest Build (nightly)"
          prerelease: true
          make_latest: false
          files: packages/extension/release/karl-jr-latest.zip
          body: |
            Automatically built from the latest commit on `main`.

            **Version:** ${{ steps.version.outputs.version }}
            **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Install
            1. Download `karl-jr-latest.zip` below
            2. Unzip it
            3. Go to `chrome://extensions/`, enable **Developer mode**
            4. Click **Load unpacked** and select the unzipped folder
